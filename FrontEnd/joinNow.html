<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join Now - THE TITAN GYM</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style/joinNow.css">
</head>
<body>

    <div class="register-container">
        <div class="register-box">
            <h2>Join THE ABC GYM</h2>
            <p>Start your fitness journey today</p>

            <form id="registerForm">

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name">
                </div>

                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>

                <div class="input-group">
                    <label>Phone</label>
                    <input type="tel" id="phone" placeholder="Enter your phone number">
                </div>

                <div class="input-group">
                    <label>Message</label>
                    <textarea id="message" placeholder="Enter your message or query" rows="4"></textarea>
                </div>

                <button type="submit" class="register-btn">Send Enquiry</button>

            </form>
        </div>
    </div>

    <script src="Script/joinNow.js"></script>
</body>
</html>
